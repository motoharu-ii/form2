<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打ち合わせ調整サービス</title>
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f7f5f3;
      color: #333;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }
    .form-container {
      background-color: #fff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      max-width: 500px;
      width: 100%;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: flex;
      align-items: center;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .required {
      color: #d24d14;
      font-size: 0.85em;
      margin-left: 8px;
      font-weight: normal;
    }
    .note {
      font-size: 0.85em;
      color: #666;
      margin-bottom: 8px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    select:focus {
      border-color: #1b6ef3;
      outline: none;
    }
    button.submit-btn {
      width: 100%;
      padding: 14px;
      background-color: #de2d2d;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    button.submit-btn:hover {
      background-color: #b90a0a;
    }
    .terms-text {
      font-size: 0.75em;
      color: #666;
      text-align: center;
      margin-top: 16px;
      line-height: 1.5;
    }
    a { color: #1b6ef3; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>打ち合わせ調整サービス</h2>
    <p class="note">こちらのフォームにお客様の情報を入力してください。<br>日程の調整やサービス提供企業から的確なご案内ができるよう、お電話にて5分ほどお話を伺わせてください。</p>

    <form action="https://script.google.com/macros/s/AKfycbxIfQ64xCq1_71OjfqHi0Q_rSzff7fc40v1hyMCuSOplFqzju1IwAaQPZ8fSo5VB5xwaA/exec" method="POST">
      
      <div class="form-group">
        <label for="companyName">会社名<span class="required">[必須]</span></label>
        <input type="text" id="companyName" name="companyName" placeholder="PRONI株式会社" required>
      </div>

      <div class="form-group">
        <label for="name">氏名<span class="required">[必須]</span></label>
        <input type="text" id="name" name="name" placeholder="山田一郎" required>
      </div>

      <div class="form-group">
        <label for="tel">電話番号<span class="required">[必須]</span></label>
        <input type="tel" id="tel" name="tel" placeholder="09012345678" maxlength="11" required>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス<span class="required">[必須]</span></label>
        <p class="note">※会社用メールアドレスをご入力ください。</p>
        <input type="email" id="email" name="email" placeholder="info@proni.co.jp" required>
      </div>

      <div class="form-group">
        <label for="employeeSize">従業員規模<span class="required">[必須]</span></label>
        <select id="employeeSize" name="employeeSize" required>
          <option value="" disabled selected>選択してください</option>
          <option value="1-9">1-9</option>
          <option value="10-19">10-19</option>
          <option value="20-29">20-29</option>
          <option value="30-49">30-49</option>
          <option value="50-99">50-99</option>
          <option value="100-299">100-299</option>
          <option value="300-499">300-499</option>
          <option value="500-999">500-999</option>
          <option value="1,000-">1,000-</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">同意して送信する</button>

      <p class="terms-text">
        この打ち合わせ調整サービスはPRONI株式会社により提供されています。<br>
        PRONI<a href="https://imitsu.jp/terms/" target="_blank">利用規約</a>、<a href="https://www.proni.co.jp/privacy-policy/" target="_blank">プライバシーポリシー</a>に同意の上、送信してください。
      </p>
    </form>
  </div>

</body>
</html>
